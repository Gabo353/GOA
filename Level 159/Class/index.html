    <header>
      <img
        src="./library_add_check_27dp_WHITE_FILL0_wght400_GRAD0_opsz24.png"

      />

    </header>
    <button id="delete_all">Delete All Tasks</button>
    <div id="contain_div">
      <div id="txt_div">
        <span class="moto_txt">Task Done</span>
        <span class="moto_txt_2">Keep it up</span>
      </div>

      <div id="circle">
        <p id="count">0/0</p>
      </div>
    </div>

    <div id="user_UI">
      <input type="text" placeholder="Write your next task" id="input" />
      <div id="add">
        <img
          src="./add_2_27dp_1F1F1FBLACK_FILL0_wght400_GRAD0_opsz24.png"
          alt="add"
          id="addd_img"
        />
      </div>
    </div>
